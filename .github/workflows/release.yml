name: release

# Builds the four spawner targets and signs each with cosign keyless OIDC.
# Triggered by pushing a `vX.Y.Z` tag — the resulting Sigstore cert binds to
# this workflow file at this tag, which `src/updater.rs` will pin against.
# `workflow_dispatch` runs the build + signing on demand without creating a
# release; useful for smoke-testing the pipeline (signatures from non-tag refs
# won't pass the spawner's `--certificate-identity-regexp 'refs/tags/v.*'`
# check, which is the point).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # for creating the GitHub Release
  id-token: write   # for the OIDC token cosign uses to talk to Fulcio

jobs:
  build:
    name: build ${{ matrix.target.suffix }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          # macos-latest is arm64. darwin-x86_64 cross-compiles from it via the
          # Apple universal SDK — no extra setup needed beyond `rustup target add`.
          - { runner: macos-latest,     rust: aarch64-apple-darwin,      suffix: darwin-arm64 }
          - { runner: macos-latest,     rust: x86_64-apple-darwin,       suffix: darwin-x86_64 }
          - { runner: ubuntu-latest,    rust: x86_64-unknown-linux-gnu,  suffix: linux-x86_64 }
          - { runner: ubuntu-24.04-arm, rust: aarch64-unknown-linux-gnu, suffix: linux-aarch64 }

    steps:
      - uses: actions/checkout@v4

      - name: install rust target
        run: rustup target add ${{ matrix.target.rust }}

      - name: build release
        run: cargo build --release --target ${{ matrix.target.rust }}

      - name: stage artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target.rust }}/release/zucchini-spawner" \
             "dist/zucchini-spawner-${{ matrix.target.suffix }}"

      # Apple Developer ID codesign on macOS targets — matches build-releases.sh
      # so the designated requirement (identifier + team ID UGHY643XCA) stays
      # stable across autoupdates and macOS TCC folder-access grants survive.
      # Skipped silently on Linux runners (`if: runner.os == 'macOS'`).
      - name: import Apple Developer ID cert
        if: runner.os == 'macOS'
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12" ]; then
            echo "::error::APPLE_CERT_P12 secret is not set"
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERT_P12" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          rm "$CERT_PATH"

      - name: codesign macOS binary
        if: runner.os == 'macOS'
        run: |
          codesign --sign "Developer ID Application: Hayaku Tech Limited (UGHY643XCA)" \
            --options runtime --timestamp --force \
            "dist/zucchini-spawner-${{ matrix.target.suffix }}"
          codesign --verify --verbose \
            "dist/zucchini-spawner-${{ matrix.target.suffix }}"

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign (keyless)
        run: |
          cosign sign-blob \
            --yes \
            --bundle "dist/zucchini-spawner-${{ matrix.target.suffix }}.sigstore" \
            "dist/zucchini-spawner-${{ matrix.target.suffix }}"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spawner-${{ matrix.target.suffix }}
          path: |
            dist/zucchini-spawner-${{ matrix.target.suffix }}
            dist/zucchini-spawner-${{ matrix.target.suffix }}.sigstore
          if-no-files-found: error

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: validate tag matches Cargo.toml
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$tag_version) does not match Cargo.toml version $cargo_version"
            exit 1
          fi
          echo "$cargo_version" > dist/zucchini-spawner-version.txt

      - name: github release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zucchini-spawner-darwin-arm64
            dist/zucchini-spawner-darwin-arm64.sigstore
            dist/zucchini-spawner-darwin-x86_64
            dist/zucchini-spawner-darwin-x86_64.sigstore
            dist/zucchini-spawner-linux-x86_64
            dist/zucchini-spawner-linux-x86_64.sigstore
            dist/zucchini-spawner-linux-aarch64
            dist/zucchini-spawner-linux-aarch64.sigstore
            dist/zucchini-spawner-version.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
